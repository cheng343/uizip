name: Build and Release uiZip

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-msvc

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Verify NSIS
        run: |
          dir "C:\Program Files (x86)\NSIS\Bin\makensis.exe"
          echo "C:\Program Files (x86)\NSIS\Bin" | Out-File -Append -FilePath  -Encoding utf8

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri
        run: npx tauri build --bundles nsis

      - name: Find installer
        run: Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -Filter *.exe

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: uiZip-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
